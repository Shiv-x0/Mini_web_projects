<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Color Picker</title>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            roboto: ["Roboto", "sans-serif"],
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="min-h-screen flex items-center justify-center bg-gray-50 transition-colors duration-300">
        <div class="w-full max-w-md p-6">
            <h1 class="text-2xl text-center font-roboto font-semibold mb-6">Color Picker</h1>

            <div id="palette" class="space-y-4">
                <button class="w-full py-6 rounded-full shadow-md flex items-center justify-center bg-[#b8b8d1] text-gray-900 text-lg font-roboto" onclick="setColor('#b8b8d1')">b8b8d1</button>
                <button class="w-full py-6 rounded-full shadow-md flex items-center justify-center bg-[#5b5f97] text-white text-lg font-roboto" onclick="setColor('#5b5f97')">5b5f97</button>
                <button class="w-full py-6 rounded-full shadow-md flex items-center justify-center bg-[#ffc145] text-gray-900 text-lg font-roboto" onclick="setColor('#ffc145')">ffc145</button>
                <button class="w-full py-6 rounded-full shadow-md flex items-center justify-center bg-[#fffffb] text-gray-900 text-lg font-roboto" onclick="setColor('#fffffb')">fffffb</button>
                <button class="w-full py-6 rounded-full shadow-md flex items-center justify-center bg-[#ff6b6c] text-white text-lg font-roboto" onclick="setColor('#ff6b6c')">ff6b6c</button>
            </div>

            <p class="mt-6 text-center">Background Color: <span id="current">#f8fafc</span></p>
        </div>

        <script src = "script.js">
            
        </script>
    </body>
</html>
